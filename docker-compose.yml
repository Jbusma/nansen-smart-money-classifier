services:
  # ── Clickhouse feature store ──────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: nansen
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python FastAPI backend ────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro

  # ── Streamlit dashboard ───────────────────────────────────────────
  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      API_URL: http://api:8000
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      clickhouse:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro

  # ── MCP server ────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      API_URL: http://api:8000
      MCP_PORT: "3001"
    depends_on:
      - api

volumes:
  clickhouse_data:
