nansen_wallet_features:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: nansen_features_dev
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
      retries: 1

    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: nansen_features_prod
      location: US
      threads: 8
      timeout_seconds: 600
      priority: interactive
      retries: 3
